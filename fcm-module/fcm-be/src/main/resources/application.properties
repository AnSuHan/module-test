spring.application.name=fcm
server.port=8080
# 기능은 ash-fcm-module 이 제공한다. 모듈의 dev 프로파일(application-dev.properties)을 로드한다.
spring.profiles.active=dev

# 프론트엔드 개발 서버 Origin (콤마 구분). 필요에 맞게 수정.
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Actuator/Prometheus 노출
management.endpoints.web.exposure.include=health,info,prometheus

# Firebase 설정
fcm.service-account-path=tistory-fcm-2605-firebase-adminsdk-fbsvc-a99fe29df4.json

# 이 런처는 com.ashmodule.fcm 패키지를 직접 컴포넌트 스캔하므로(모듈 빈이 이미 등록됨),
# 모듈의 자동 구성(FcmAutoConfiguration)을 꺼서 중복 등록(BeanDefinitionOverrideException)을 방지한다.
fcm.autoconfigure.enabled=false

# Android 8+ 알림 채널 ID — 클라이언트 앱이 동일 ID 의 채널을 생성해 두어야 알림이 표시된다.
fcm.android.default-channel-id=default

# data-only(데이터 전용) 발송. true 면 notification 블록 없이 data 페이로드만 보낸다.
# → OS 자동 표시 대신, 앱이 모든 상태(포그라운드/백그라운드/종료)에서 백그라운드 핸들러로 직접 알림을 생성한다.
fcm.message.data-only=true
